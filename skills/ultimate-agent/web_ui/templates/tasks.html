<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>任务队列 - 硅基世界 2</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/mobile.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        h1 { color: #667eea; font-size: 28px; }
        .nav { margin-top: 15px; }
        .nav a {
            display: inline-block;
            padding: 8px 16px;
            background: #f3f4f6;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            margin-right: 10px;
        }
        .nav a:hover, .nav a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .stat-value { font-size: 36px; font-weight: 700; margin-bottom: 5px; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .task-list { list-style: none; }
        .task-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .task-item.pending { border-left-color: #f59e0b; }
        .task-item.running { border-left-color: #3b82f6; }
        .task-item.completed { border-left-color: #10b981; }
        .task-item.failed { border-left-color: #ef4444; }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .task-title { font-weight: 600; color: #333; }
        .task-priority {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .priority-low { background: #e5e7eb; color: #374151; }
        .priority-normal { background: #dbeafe; color: #1e40af; }
        .priority-high { background: #fed7aa; color: #9a3412; }
        .priority-urgent { background: #fecaca; color: #991b1b; }
        .task-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
        }
        .task-meta span { display: flex; align-items: center; gap: 5px; }
        .progress-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        .empty-state h3 { font-size: 24px; margin-bottom: 10px; }
        .empty-state p { opacity: 0.9; }
        .loading { text-align: center; padding: 40px; color: white; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📋 任务队列</h1>
                <div style="font-size: 12px; color: #666; margin-top: 5px;">
                    WebSocket: <span id="ws-indicator" style="color: #f59e0b;">⚪ 未连接</span>
                </div>
            </div>
            <div class="nav">
                <a href="index.html">📊 仪表板</a>
                <a href="agents.html">🤖 代理管理</a>
                <a href="tasks.html" class="active">📋 任务队列</a>
                <a href="graph.html">🕸️ 知识图谱</a>
            </div>
        </header>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                正在加载任务队列...
            </div>
        </div>
    </div>
    
    <script>
        // WebSocket 连接状态
        let socket = null;
        let wsConnected = false;
        let tasksData = {};
        
        // 初始化 WebSocket 连接
        function initWebSocket() {
            const indicator = document.getElementById('ws-indicator');
            
            if (typeof io === 'undefined') {
                indicator.textContent = '⚠️ Socket.IO 不可用';
                indicator.style.color = '#f59e0b';
                console.log('⚠️ Socket.IO 不可用，使用轮询模式');
                return;
            }
            
            socket = io();
            
            socket.on('connect', () => {
                wsConnected = true;
                indicator.textContent = '🟢 已连接';
                indicator.style.color = '#22c55e';
                console.log('✅ WebSocket 已连接');
                socket.emit('subscribe', { topic: 'tasks' });
            });
            
            socket.on('disconnect', () => {
                wsConnected = false;
                indicator.textContent = '🔴 已断开';
                indicator.style.color = '#ef4444';
                console.log('❌ WebSocket 已断开');
            });
            
            socket.on('connect_error', (error) => {
                wsConnected = false;
                indicator.textContent = '🟡 连接失败';
                indicator.style.color = '#f59e0b';
                console.error('WebSocket 连接错误:', error);
            });
            
            // 监听任务更新
            socket.on('task_update', (data) => {
                console.log('📋 收到任务更新:', data);
                loadTasks();
            });
            
            console.log('🔌 正在连接 WebSocket...');
        }
        
        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                const data = await response.json();
                tasksData = data;
                
                const content = document.getElementById('content');
                
                if (data.total === 0) {
                    content.innerHTML = `
                        <div class="card">
                            <div class="empty-state">
                                <h3>📭 暂无任务</h3>
                                <p>任务队列为空，创建新任务开始工作吧！</p>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                content.innerHTML = `
                    <div class="card">
                        <div class="stats-row">
                            <div class="stat-card">
                                <div class="stat-value">${data.pending || 0}</div>
                                <div class="stat-label">⏳ 待处理</div>
                            </div>
                            <div class="stat-card" style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);">
                                <div class="stat-value">${data.running || 0}</div>
                                <div class="stat-label">▶️ 运行中</div>
                            </div>
                            <div class="stat-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                                <div class="stat-value">${data.completed || 0}</div>
                                <div class="stat-label">✅ 已完成</div>
                            </div>
                            <div class="stat-card" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                                <div class="stat-value">${data.failed || 0}</div>
                                <div class="stat-label">❌ 失败</div>
                            </div>
                        </div>
                        
                        <h2 style="margin-bottom: 15px; color: #333;">
                            任务列表 <span style="color: #666; font-size: 14px;">(共 ${data.total} 个)</span>
                        </h2>
                        
                        <ul class="task-list">
                            <li class="task-item running">
                                <div class="task-header">
                                    <span class="task-title">示例任务 - 研究 AI 发展趋势</span>
                                    <span class="task-priority priority-normal">普通</span>
                                </div>
                                <div class="task-meta">
                                    <span>🕐 2026-03-11 18:15</span>
                                    <span>🤖 Researcher</span>
                                    <span>⏱️ 进行中</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 60%"></div>
                                </div>
                            </li>
                            <li class="task-item pending">
                                <div class="task-header">
                                    <span class="task-title">示例任务 - 生成日报</span>
                                    <span class="task-priority priority-high">高</span>
                                </div>
                                <div class="task-meta">
                                    <span>🕐 2026-03-11 18:10</span>
                                    <span>🤖 Reporter</span>
                                    <span>⏱️ 等待中</span>
                                </div>
                            </li>
                            <li class="task-item completed">
                                <div class="task-header">
                                    <span class="task-title">示例任务 - 系统检查</span>
                                    <span class="task-priority priority-low">低</span>
                                </div>
                                <div class="task-meta">
                                    <span>🕐 2026-03-11 18:00</span>
                                    <span>🤖 Heartbeat</span>
                                    <span>⏱️ 已完成</span>
                                </div>
                            </li>
                        </ul>
                        
                        <div class="actions">
                            <button class="btn btn-primary" onclick="showNewTaskModal()">➕ 新建任务</button>
                            <button class="btn btn-success" onclick="startQueue()">▶️ 启动队列</button>
                            <button class="btn btn-danger" onclick="clearCompleted()">🗑️ 清空已完成</button>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="card">
                        <div style="text-align: center; padding: 40px;">
                            <h2>❌ 加载失败</h2>
                            <p style="color: #666; margin-top: 10px;">${error.message}</p>
                        </div>
                    </div>
                `;
            }
        }
        
        // 显示新建任务模态框
        function showNewTaskModal() {
            const description = prompt('请输入任务描述:');
            if (description) {
                const priority = prompt('优先级 (low/normal/high/urgent):', 'normal');
                fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description, priority: priority || 'normal' })
                })
                .then(res => res.json())
                .then(data => {
                    alert('✅ 任务创建成功!');
                    loadTasks();
                })
                .catch(err => alert('❌ 创建失败：' + err.message));
            }
        }
        
        // 启动任务队列
        function startQueue() {
            fetch('/api/tasks/start', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    alert('✅ 任务队列已启动!');
                    loadTasks();
                })
                .catch(err => alert('❌ 启动失败：' + err.message));
        }
        
        // 清空已完成任务
        function clearCompleted() {
            if (confirm('确定要清空所有已完成的任务吗？')) {
                fetch('/api/tasks/clear-completed', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        alert('✅ 已完成任务已清空!');
                        loadTasks();
                    })
                    .catch(err => alert('❌ 清空失败：' + err.message));
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            initWebSocket();
        });
    </script>
</body>
</html>
