<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>硅基世界 2 Dashboard</title>
    <link rel="stylesheet" href="/static/mobile.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .theme-toggle {
            background: #f3f4f6;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .theme-toggle:hover {
            background: #e5e7eb;
            transform: scale(1.05);
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        /* 暗黑模式 */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        body.dark-mode header {
            background: rgba(30, 30, 50, 0.95);
        }
        
        body.dark-mode h1 {
            color: #a78bfa;
        }
        
        body.dark-mode .subtitle {
            color: #9ca3af;
        }
        
        body.dark-mode .card {
            background: rgba(30, 30, 50, 0.95);
        }
        
        body.dark-mode .card h2 {
            color: #e5e7eb;
        }
        
        body.dark-mode .stat-item {
            background: #1f2937;
        }
        
        body.dark-mode .agent-item {
            border-bottom-color: #374151;
        }
        
        body.dark-mode .agent-status {
            color: #e5e7eb;
        }
        
        body.dark-mode .theme-toggle {
            background: #374151;
            color: #fbbf24;
        }
        
        body.dark-mode .theme-toggle:hover {
            background: #4b5563;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2 .icon {
            font-size: 24px;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-active {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
        
        .status-warning {
            background: #f59e0b;
        }
        
        .status-error {
            background: #ef4444;
        }
        
        .agent-list {
            list-style: none;
        }
        
        .agent-item {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .agent-item:last-child {
            border-bottom: none;
        }
        
        .agent-name {
            font-weight: 500;
            color: #333;
        }
        
        .agent-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #d1fae5;
            color: #065f46;
        }
        
        .log-container {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .timestamp {
            color: #6b7280;
            margin-right: 10px;
        }
        
        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🌍 硅基世界 2 Dashboard</h1>
                <div class="subtitle">多 AI 代理协作系统监控平台</div>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
                <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
            </div>
        </header>
        
        <div id="dashboard" class="dashboard">
            <div class="loading">
                <div class="spinner"></div>
                正在加载系统状态...
            </div>
        </div>
        
        <footer>
            <p>硅基世界 2 v3.2.0 | Phase 6.1 Edition | 🐱 三二出品</p>
            <div id="ws-status" style="margin-top: 10px; font-size: 12px; color: #666;">
                WebSocket: <span id="ws-indicator">⚪ 未连接</span>
            </div>
        </footer>
    </div>
    
    <!-- Socket.IO 客户端 -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <script>
        // WebSocket 连接状态
        let socket = null;
        let wsConnected = false;
        
        // 初始化 WebSocket 连接
        function initWebSocket() {
            const indicator = document.getElementById('ws-indicator');
            
            // 连接到 Socket.IO 服务器
            socket = io();
            
            socket.on('connect', () => {
                wsConnected = true;
                indicator.textContent = '🟢 已连接';
                indicator.style.color = '#22c55e';
                console.log('✅ WebSocket 已连接');
                
                // 订阅主题
                socket.emit('subscribe', { topic: 'status' });
                socket.emit('subscribe', { topic: 'tasks' });
                socket.emit('subscribe', { topic: 'agents' });
            });
            
            socket.on('disconnect', () => {
                wsConnected = false;
                indicator.textContent = '🔴 已断开';
                indicator.style.color = '#ef4444';
                console.log('❌ WebSocket 已断开');
            });
            
            socket.on('connect_error', (error) => {
                wsConnected = false;
                indicator.textContent = '🟡 连接失败';
                indicator.style.color = '#f59e0b';
                console.error('WebSocket 连接错误:', error);
            });
            
            // 监听状态更新
            socket.on('status_update', (data) => {
                console.log('📊 收到状态更新:', data);
                updateDashboard(data);
            });
            
            // 监听任务更新
            socket.on('task_update', (data) => {
                console.log('📋 收到任务更新:', data);
                updateTaskQueue(data);
            });
            
            // 监听代理更新
            socket.on('agent_update', (data) => {
                console.log('🤖 收到代理更新:', data);
                updateAgentStatus(data);
            });
            
            // 心跳响应
            socket.on('pong', (data) => {
                console.log('🏓 WebSocket 心跳响应:', data.timestamp);
            });
            
            console.log('🔌 正在连接 WebSocket...');
        }
        
        // 格式化时间
        function formatTime(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }
        
        // 渲染系统概览卡片
        function renderSystemOverview(status) {
            return `
                <div class="card">
                    <h2><span class="icon">📊</span> 系统概览</h2>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-value">${status.version || '3.1.0'}</div>
                            <div class="stat-label">系统版本</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${status.timestamp ? '运行中' : '离线'}</div>
                            <div class="stat-label">运行状态</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${new Date().toLocaleTimeString('zh-CN')}</div>
                            <div class="stat-label">当前时间</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">Phase 5</div>
                            <div class="stat-label">开发阶段</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 渲染代理状态卡片
        function renderAgentStatus(components) {
            const agents = [
                { key: 'coordinator', name: '协调器', icon: '🎯' },
                { key: 'researcher', name: '研究员', icon: '🔍' },
                { key: 'messenger', name: '消息聚合', icon: '💬' },
                { key: 'heartbeat', name: '心跳检查', icon: '💓' },
                { key: 'executor', name: '自动执行', icon: '⚡' },
                { key: 'improver', name: '自我改进', icon: '📈' },
                { key: 'notification', name: '通知代理', icon: '🔔' },
                { key: 'reporter', name: '报告生成', icon: '📝' },
            ];
            
            let html = `
                <div class="card">
                    <h2><span class="icon">🤖</span> 代理状态</h2>
                    <ul class="agent-list">
            `;
            
            agents.forEach(agent => {
                const data = components[agent.key];
                const isActive = data && data.status === 'active';
                html += `
                    <li class="agent-item">
                        <span class="agent-name">${agent.icon} ${agent.name}</span>
                        <span class="agent-status">
                            <span class="status-indicator ${isActive ? 'status-active' : 'status-warning'}"></span>
                            ${isActive ? '运行中' : '未激活'}
                        </span>
                    </li>
                `;
            });
            
            html += `</ul></div>`;
            return html;
        }
        
        // 渲染任务队列卡片
        function renderTaskQueue(tasks) {
            return `
                <div class="card">
                    <h2><span class="icon">📋</span> 任务队列</h2>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-value">${tasks.pending || 0}</div>
                            <div class="stat-label">待处理</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${tasks.running || 0}</div>
                            <div class="stat-label">运行中</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${tasks.completed || 0}</div>
                            <div class="stat-label">已完成</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${tasks.failed || 0}</div>
                            <div class="stat-label">失败</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 渲染知识图谱卡片
        function renderKnowledgeGraph(components) {
            const kg = components.knowledge_graph || {};
            return `
                <div class="card">
                    <h2><span class="icon">🕸️</span> 知识图谱</h2>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-value">${kg.total_nodes || 0}</div>
                            <div class="stat-label">节点数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${kg.total_relations || 0}</div>
                            <div class="stat-label">关系数</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 加载数据
        async function loadDashboard() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const components = data.components || {};
                const tasks = components.executor || {};
                
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = `
                    ${renderSystemOverview(data)}
                    ${renderAgentStatus(components)}
                    ${renderTaskQueue(tasks)}
                    ${renderKnowledgeGraph(components)}
                `;
                
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('dashboard').innerHTML = `
                    <div class="card" style="grid-column: 1 / -1;">
                        <h2>❌ 加载失败</h2>
                        <p>无法连接到系统 API，请确保后端服务正在运行。</p>
                        <p style="margin-top: 10px; color: #666;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 刷新数据
        function refreshData() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `
                <div class="loading" style="grid-column: 1 / -1;">
                    <div class="spinner"></div>
                    正在刷新数据...
                </div>
            `;
            loadDashboard();
        }
        
        // 更新整个仪表板
        function updateDashboard(data) {
            const components = data.components || {};
            const tasks = components.executor || {};
            
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `
                ${renderSystemOverview(data)}
                ${renderAgentStatus(components)}
                ${renderTaskQueue(tasks)}
                ${renderKnowledgeGraph(components)}
            `;
        }
        
        // 更新任务队列显示
        function updateTaskQueue(tasksData) {
            const taskCard = document.querySelector('.card h2 span.icon:has(📋)')?.closest('.card');
            if (taskCard) {
                taskCard.outerHTML = renderTaskQueue(tasksData);
            }
        }
        
        // 更新代理状态显示
        function updateAgentStatus(agentData) {
            // 重新加载代理状态
            loadDashboard();
        }
        
        // 切换主题
        function toggleTheme() {
            const body = document.body;
            const toggle = document.getElementById('theme-toggle');
            body.classList.toggle('dark-mode');
            
            const isDark = body.classList.contains('dark-mode');
            toggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        
        // 加载保存的主题
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const toggle = document.getElementById('theme-toggle');
            
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                toggle.textContent = '☀️';
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadDashboard();
            
            // 初始化 WebSocket 连接
            if (typeof io !== 'undefined') {
                initWebSocket();
            } else {
                console.log('⚠️ Socket.IO 不可用，使用轮询模式');
                // 降级为轮询模式
                setInterval(loadDashboard, 30000);
            }
        });
        
        // 降级轮询（如果 WebSocket 不可用）
        let pollInterval = null;
        socket?.on('connect_error', () => {
            if (!pollInterval) {
                console.log('🔄 切换到轮询模式');
                pollInterval = setInterval(loadDashboard, 30000);
            }
        });
    </script>
</body>
</html>
