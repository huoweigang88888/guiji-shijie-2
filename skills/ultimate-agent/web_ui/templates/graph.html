<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱 - 硅基世界 2</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        h1 { color: #667eea; font-size: 28px; }
        .nav { margin-top: 15px; }
        .nav a {
            display: inline-block;
            padding: 8px 16px;
            background: #f3f4f6;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            margin-right: 10px;
        }
        .nav a:hover, .nav a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .graph-container {
            height: 600px;
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
        }
        #graph-chart {
            width: 100%;
            height: 100%;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 15px;
            color: white;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; opacity: 0.9; margin-top: 5px; }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            background: #e5e7eb;
            color: #333;
            transition: all 0.2s;
        }
        .btn:hover { background: #d1d5db; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loading { text-align: center; padding: 60px; color: white; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕸️ 知识图谱</h1>
            <div class="nav">
                <a href="index.html">📊 仪表板</a>
                <a href="agents.html">🤖 代理管理</a>
                <a href="tasks.html">📋 任务队列</a>
                <a href="graph.html" class="active">🕸️ 知识图谱</a>
            </div>
        </header>
        
        <div class="card">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="stat-nodes">0</div>
                    <div class="stat-label">📍 节点数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-relations">0</div>
                    <div class="stat-label">🔗 关系数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-categories">0</div>
                    <div class="stat-label">🏷️ 分类数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-updated">-</div>
                    <div class="stat-label">🕐 更新时间</div>
                </div>
            </div>
            
            <div class="graph-container">
                <div id="graph-chart"></div>
            </div>
            
            <div class="legend" id="legend"></div>
            
            <div class="controls">
                <button class="btn btn-primary" onclick="loadGraph()">🔄 刷新</button>
                <button class="btn" onclick="exportGraph()">💾 导出</button>
                <button class="btn" onclick="resetView()">🎯 重置视图</button>
                <button class="btn" onclick="toggleAutoRefresh()">⏱️ 自动刷新：<span id="auto-refresh-status">关</span></button>
            </div>
        </div>
    </div>
    
    <script>
        let chart = null;
        let graphData = { nodes: [], links: [] };
        let autoRefresh = false;
        let refreshInterval = null;
        
        // 初始化 ECharts
        function initChart() {
            const container = document.getElementById('graph-chart');
            chart = echarts.init(container);
            
            chart.on('click', function(params) {
                if (params.dataType === 'node') {
                    alert('节点：' + params.data.label + '\n分类：' + params.data.category);
                }
            });
            
            window.addEventListener('resize', () => chart.resize());
        }
        
        // 加载图谱数据
        async function loadGraph() {
            try {
                const response = await fetch('/api/knowledge-graph');
                const data = await response.json();
                
                graphData = data;
                
                // 更新统计
                document.getElementById('stat-nodes').textContent = data.nodes.length;
                document.getElementById('stat-relations').textContent = data.links.length;
                
                const categories = [...new Set(data.nodes.map(n => n.category))];
                document.getElementById('stat-categories').textContent = categories.length;
                document.getElementById('stat-updated').textContent = new Date().toLocaleTimeString('zh-CN');
                
                // 渲染图例
                renderLegend(categories);
                
                // 渲染图表
                renderChart(data);
                
            } catch (error) {
                console.error('加载失败:', error);
                alert('加载图谱失败：' + error.message);
            }
        }
        
        // 渲染图表
        function renderChart(data) {
            const categories = [...new Set(data.nodes.map(n => n.category))];
            const categoryMap = {};
            categories.forEach((cat, i) => {
                categoryMap[cat] = i;
            });
            
            const option = {
                tooltip: {
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            return `<strong>${params.data.label}</strong><br/>分类：${params.data.category}`;
                        } else {
                            return `<strong>${params.data.source}</strong> → <strong>${params.data.target}</strong><br/>关系：${params.data.type}`;
                        }
                    }
                },
                legend: [{
                    data: categories.map(cat => cat),
                    bottom: 10,
                    left: 'center'
                }],
                series: [{
                    type: 'graph',
                    layout: 'force',
                    data: data.nodes.map(node => ({
                        id: node.id,
                        name: node.label,
                        value: node.label,
                        symbolSize: 40,
                        category: categoryMap[node.category],
                        draggable: true
                    })),
                    links: data.links.map(link => ({
                        source: link.source,
                        target: link.target,
                        value: link.type
                    })),
                    categories: categories.map(cat => ({ name: cat })),
                    roam: true,
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{b}'
                    },
                    lineStyle: {
                        color: 'source',
                        curveness: 0.3,
                        width: 2
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: {
                            width: 4
                        }
                    },
                    force: {
                        repulsion: 300,
                        edgeLength: 100,
                        gravity: 0.1
                    }
                }]
            };
            
            chart.setOption(option);
        }
        
        // 渲染图例
        function renderLegend(categories) {
            const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4'];
            const legend = document.getElementById('legend');
            legend.innerHTML = categories.map((cat, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[i % colors.length]}"></div>
                    <span>${cat}</span>
                </div>
            `).join('');
        }
        
        // 导出图谱
        function exportGraph() {
            const url = chart.getDataURL({
                type: 'png',
                pixelRatio: 2,
                backgroundColor: '#fff'
            });
            const a = document.createElement('a');
            a.href = url;
            a.download = 'knowledge-graph.png';
            a.click();
        }
        
        // 重置视图
        function resetView() {
            chart.dispatchAction({ type: 'restore' });
        }
        
        // 切换自动刷新
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            document.getElementById('auto-refresh-status').textContent = autoRefresh ? '开' : '关';
            
            if (autoRefresh) {
                refreshInterval = setInterval(loadGraph, 5000);
            } else if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            
            // 显示加载动画
            document.querySelector('.graph-container').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    正在加载知识图谱...
                </div>
            `;
            
            setTimeout(() => {
                document.querySelector('.graph-container').innerHTML = '<div id="graph-chart"></div>';
                initChart();
                loadGraph();
            }, 500);
        });
    </script>
</body>
</html>
