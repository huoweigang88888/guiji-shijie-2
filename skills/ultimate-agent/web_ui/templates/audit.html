<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>审计日志 - 硅基世界 2</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/mobile.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        h1 { color: #667eea; font-size: 28px; }
        .nav { margin-top: 15px; }
        .nav a {
            display: inline-block;
            padding: 8px 16px;
            background: #f3f4f6;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            margin-right: 10px;
        }
        .nav a:hover, .nav a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .stat-value { font-size: 36px; font-weight: 700; }
        .stat-label { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }
        .filter-select, .filter-input {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary { background: #e5e7eb; color: #333; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn:hover { transform: translateY(-1px); }
        
        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .log-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e5e7eb;
        }
        .log-table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            color: #555;
        }
        .log-table tr:hover {
            background: #f8f9fa;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-success { background: #d1fae5; color: #065f46; }
        .status-failure { background: #fecaca; color: #991b1b; }
        .event-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            background: #e0e7ff;
            color: #3730a3;
        }
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .pagination-info {
            color: #666;
            font-size: 13px;
        }
        .pagination-buttons {
            display: flex;
            gap: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .loading { text-align: center; padding: 40px; color: white; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #ws-indicator { font-size: 12px; color: #f59e0b; }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1001;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        
        .details-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            color: #667eea;
        }
        .details-cell:hover {
            text-decoration: underline;
        }
        
        /* 详情模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow: auto;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            color: #333;
            font-size: 18px;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        .modal-body {
            padding: 20px;
        }
        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .detail-label {
            font-weight: 600;
            color: #666;
            width: 120px;
            flex-shrink: 0;
        }
        .detail-value {
            color: #333;
            flex: 1;
            word-break: break-all;
        }
        .detail-value pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📜 审计日志</h1>
                <div style="font-size: 12px; color: #666; margin-top: 5px;">
                    WebSocket: <span id="ws-indicator" style="color: #f59e0b;">⚪ 未连接</span>
                    <span id="user-info" style="margin-left: 15px;"></span>
                </div>
            </div>
            <div class="nav">
                <a href="index.html">📊 仪表板</a>
                <a href="agents.html">🤖 代理管理</a>
                <a href="config.html">⚙️ 代理配置</a>
                <a href="tasks.html">📋 任务队列</a>
                <a href="graph.html">🕸️ 知识图谱</a>
                <a href="logs.html">📜 系统日志</a>
                <a href="notifications.html">🔔 通知中心</a>
                <a href="reports.html">📝 报告预览</a>
                <a href="audit.html" class="active">🔍 审计日志</a>
                <a href="users.html">👥 用户管理</a>
            </div>
        </header>
        
        <div class="card">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">📊 总日志数</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                    <div class="stat-value" id="stat-success">0</div>
                    <div class="stat-label">✅ 成功</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                    <div class="stat-value" id="stat-failure">0</div>
                    <div class="stat-label">❌ 失败</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                    <div class="stat-value" id="stat-users">0</div>
                    <div class="stat-label">👥 活跃用户</div>
                </div>
            </div>
            
            <div class="filter-bar">
                <div class="filter-group">
                    <label>事件类型</label>
                    <select class="filter-select" id="filter-event-type">
                        <option value="">全部</option>
                        <option value="login">登录</option>
                        <option value="logout">登出</option>
                        <option value="config_change">配置变更</option>
                        <option value="task_create">任务创建</option>
                        <option value="task_delete">任务删除</option>
                        <option value="user_create">用户创建</option>
                        <option value="user_delete">用户删除</option>
                        <option value="report_generate">报告生成</option>
                        <option value="api_request">API 请求</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>用户</label>
                    <select class="filter-select" id="filter-user">
                        <option value="">全部</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>状态</label>
                    <select class="filter-select" id="filter-status">
                        <option value="">全部</option>
                        <option value="success">成功</option>
                        <option value="failure">失败</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>开始日期</label>
                    <input type="date" class="filter-input" id="filter-start-date">
                </div>
                
                <div class="filter-group">
                    <label>结束日期</label>
                    <input type="date" class="filter-input" id="filter-end-date">
                </div>
                
                <input type="text" class="filter-input search-input" id="search-input" placeholder="🔍 搜索日志...">
                
                <button class="btn btn-primary" onclick="loadLogs()">🔄 刷新</button>
                <button class="btn btn-success" onclick="exportLogs()">💾 导出 CSV</button>
            </div>
            
            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    正在加载审计日志...
                </div>
            </div>
            
            <div class="pagination" id="pagination" style="display: none;">
                <div class="pagination-info" id="pagination-info">显示 0-0 共 0 条</div>
                <div class="pagination-buttons">
                    <button class="btn btn-secondary" onclick="prevPage()">⏮️ 上一页</button>
                    <button class="btn btn-secondary" onclick="nextPage()">下一页 ⏭️</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 详情模态框 -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📝 日志详情</h3>
                <button class="close-btn" onclick="closeDetail()">×</button>
            </div>
            <div class="modal-body" id="detail-body">
                <!-- 详情内容 -->
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let logs = [];
        let currentPage = 1;
        const pageSize = 50;
        let totalLogs = 0;
        let socket = null;
        let currentUser = null;
        
        // 检查登录状态
        async function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const userInfo = localStorage.getItem('user_info');
            
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (!data.valid) {
                    window.location.href = '/login.html';
                    return;
                }
                
                currentUser = data;
                document.getElementById('user-info').textContent = `👤 ${data.username} (${data.role})`;
                
                // 检查权限
                if (data.role !== 'admin') {
                    document.getElementById('content').innerHTML = `
                        <div class="empty-state">
                            <h3>🚫 权限不足</h3>
                            <p>审计日志仅限管理员查看</p>
                        </div>
                    `;
                    return;
                }
                
            } catch (error) {
                window.location.href = '/login.html';
            }
        }
        
        // 初始化 WebSocket
        function initWebSocket() {
            const indicator = document.getElementById('ws-indicator');
            
            if (typeof io === 'undefined') {
                indicator.textContent = '⚠️ Socket.IO 不可用';
                indicator.style.color = '#f59e0b';
                return;
            }
            
            socket = io();
            
            socket.on('connect', () => {
                indicator.textContent = '🟢 已连接';
                indicator.style.color = '#22c55e';
            });
            
            socket.on('disconnect', () => {
                indicator.textContent = '🔴 已断开';
                indicator.style.color = '#ef4444';
            });
            
            socket.on('audit_log', (data) => {
                console.log('📜 新审计日志:', data);
                loadLogs();
                loadStats();
            });
        }
        
        // 加载日志
        async function loadLogs() {
            const eventType = document.getElementById('filter-event-type').value;
            const user = document.getElementById('filter-user').value;
            const status = document.getElementById('filter-status').value;
            const startDate = document.getElementById('filter-start-date').value;
            const endDate = document.getElementById('filter-end-date').value;
            const search = document.getElementById('search-input').value;
            
            let url = `/api/audit/logs?limit=${pageSize}&offset=${(currentPage - 1) * pageSize}`;
            
            if (eventType) url += `&event_type=${eventType}`;
            if (user) url += `&username=${user}`;
            if (status) url += `&status=${status}`;
            if (startDate) url += `&start_date=${startDate}`;
            if (endDate) url += `&end_date=${endDate}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                logs = data.logs || [];
                totalLogs = data.total || 0;
                
                renderLogs();
                updatePagination();
                populateUserFilter();
            } catch (error) {
                showToast('加载失败：' + error.message, 'error');
            }
        }
        
        // 加载统计
        async function loadStats() {
            try {
                const response = await fetch('/api/audit/stats');
                const data = await response.json();
                
                document.getElementById('stat-total').textContent = data.total_entries || 0;
                document.getElementById('stat-success').textContent = data.by_status?.success || 0;
                document.getElementById('stat-failure').textContent = data.by_status?.failure || 0;
                document.getElementById('stat-users').textContent = Object.keys(data.by_user || {}).length;
                
                // 更新用户筛选
                const userSelect = document.getElementById('filter-user');
                userSelect.innerHTML = '<option value="">全部</option>';
                Object.keys(data.by_user || {}).forEach(user => {
                    userSelect.innerHTML += `<option value="${user}">${user}</option>`;
                });
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        // 渲染日志
        function renderLogs() {
            const content = document.getElementById('content');
            
            if (logs.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 暂无日志</h3>
                        <p>没有符合条件的审计日志</p>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>时间</th>
                            <th>事件类型</th>
                            <th>用户</th>
                            <th>操作</th>
                            <th>状态</th>
                            <th>详情</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${logs.map(log => `
                            <tr>
                                <td>#${log.id}</td>
                                <td>${formatTime(log.timestamp)}</td>
                                <td><span class="event-badge">${log.event_type}</span></td>
                                <td>${log.username}</td>
                                <td>${log.action}</td>
                                <td><span class="status-badge ${log.status === 'success' ? 'status-success' : 'status-failure'}">${log.status === 'success' ? '✅ 成功' : '❌ 失败'}</span></td>
                                <td class="details-cell" onclick="showDetail(${log.id})" title="点击查看详情">📝 查看</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        // 显示详情
        function showDetail(id) {
            const log = logs.find(l => l.id === id);
            if (!log) return;
            
            const modal = document.getElementById('detail-modal');
            const body = document.getElementById('detail-body');
            
            body.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">日志 ID</span>
                    <span class="detail-value">${log.id}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">时间戳</span>
                    <span class="detail-value">${formatTime(log.timestamp)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">事件类型</span>
                    <span class="detail-value">${log.event_type}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">用户名</span>
                    <span class="detail-value">${log.username}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">操作</span>
                    <span class="detail-value">${log.action}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">资源</span>
                    <span class="detail-value">${log.resource || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">状态</span>
                    <span class="detail-value">${log.status === 'success' ? '✅ 成功' : '❌ 失败'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">IP 地址</span>
                    <span class="detail-value">${log.ip_address || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">User-Agent</span>
                    <span class="detail-value">${log.user_agent || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">详细信息</span>
                    <span class="detail-value"><pre>${JSON.stringify(log.details, null, 2)}</pre></span>
                </div>
            `;
            
            modal.classList.add('active');
        }
        
        // 关闭详情
        function closeDetail() {
            document.getElementById('detail-modal').classList.remove('active');
        }
        
        // 更新分页
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const info = document.getElementById('pagination-info');
            
            if (totalLogs === 0) {
                pagination.style.display = 'none';
                return;
            }
            
            pagination.style.display = 'flex';
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, totalLogs);
            info.textContent = `显示 ${start}-${end} 共 ${totalLogs} 条`;
        }
        
        // 上一页
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadLogs();
            }
        }
        
        // 下一页
        function nextPage() {
            if (currentPage * pageSize < totalLogs) {
                currentPage++;
                loadLogs();
            }
        }
        
        // 导出 CSV
        async function exportLogs() {
            try {
                const response = await fetch('/api/audit/export');
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `audit-logs-${new Date().toISOString().slice(0,10)}.csv`;
                a.click();
                showToast('💾 导出成功', 'success');
            } catch (error) {
                showToast('导出失败：' + error.message, 'error');
            }
        }
        
        // 填充用户筛选
        function populateUserFilter() {
            const userSelect = document.getElementById('filter-user');
            const users = [...new Set(logs.map(l => l.username))];
            
            users.forEach(user => {
                if (!userSelect.querySelector(`option[value="${user}"]`)) {
                    userSelect.innerHTML += `<option value="${user}">${user}</option>`;
                }
            });
        }
        
        // 格式化时间
        function formatTime(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // 筛选器事件监听
        document.getElementById('filter-event-type').addEventListener('change', () => { currentPage = 1; loadLogs(); });
        document.getElementById('filter-user').addEventListener('change', () => { currentPage = 1; loadLogs(); });
        document.getElementById('filter-status').addEventListener('change', () => { currentPage = 1; loadLogs(); });
        document.getElementById('filter-start-date').addEventListener('change', () => { currentPage = 1; loadLogs(); });
        document.getElementById('filter-end-date').addEventListener('change', () => { currentPage = 1; loadLogs(); });
        
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { currentPage = 1; loadLogs(); }, 500);
        });
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            initWebSocket();
            loadStats();
            loadLogs();
        });
    </script>
</body>
