<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硅基世界 2 - 实时观察界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #f56565;
            --info: #4299e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .time-display {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 25px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .status-item .value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .status-item .label {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.6em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 有趣事件卡片 */
        .events-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .event-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }

        .event-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .event-item.type-knowledge_share { border-left-color: var(--info); }
        .event-item.type-deep_conversation { border-left-color: var(--warning); }
        .event-item.type-story_created { border-left-color: var(--primary); }
        .event-item.type-celebration { border-left-color: var(--success); }
        .event-item.type-collaboration { border-left-color: var(--success); }
        .event-item.type-conflict { border-left-color: var(--danger); }
        .event-item.type-innovation { border-left-color: var(--primary); }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .event-type {
            font-size: 0.85em;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.15);
        }

        .event-time {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .event-description {
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .event-agents {
            font-size: 0.85em;
            opacity: 0.8;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .event-agent-tag {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .card h2 .icon {
            font-size: 1.2em;
        }

        /* Agent 列表 */
        .agent-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .agent-item {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .agent-item:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(5px);
        }

        .agent-item.status-idle { border-left-color: var(--info); }
        .agent-item.status-working { border-left-color: var(--success); }
        .agent-item.status-thinking { border-left-color: var(--warning); }
        .agent-item.status-socializing { border-left-color: var(--primary); }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .agent-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .agent-role {
            font-size: 0.85em;
            opacity: 0.8;
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .agent-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .status-idle .agent-status { background: var(--info); }
        .status-working .agent-status { background: var(--success); }
        .status-thinking .agent-status { background: var(--warning); }
        .status-socializing .agent-status { background: var(--primary); }

        .agent-location {
            font-size: 0.9em;
            opacity: 0.85;
            margin-top: 5px;
        }

        .agent-activity {
            font-size: 0.85em;
            opacity: 0.75;
            margin-top: 5px;
            font-style: italic;
        }

        /* 区域卡片 */
        .region-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .region-item {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .region-item:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.05);
        }

        .region-name {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .region-count {
            font-size: 2em;
            font-weight: bold;
            color: var(--success);
        }

        .region-label {
            font-size: 0.85em;
            opacity: 0.8;
        }

        /* 消息列表 */
        .message-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .message-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--info);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        .message-sender {
            font-weight: bold;
            color: var(--success);
        }

        .message-time {
            opacity: 0.7;
        }

        .message-content {
            font-size: 0.9em;
            line-height: 1.5;
        }

        .message-type {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75em;
            background: var(--info);
            margin-right: 8px;
        }

        /* 故事列表 */
        .story-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .story-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid var(--warning);
        }

        .story-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .story-meta {
            font-size: 0.85em;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .story-summary {
            font-size: 0.9em;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* 统计图表 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--success);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .stat-change {
            font-size: 0.8em;
            margin-top: 5px;
        }

        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }

        /* 活动列表 */
        .activity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .activity-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .activity-info {
            font-size: 0.85em;
            opacity: 0.8;
        }

        /* 刷新按钮 */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .refresh-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 30px rgba(0,0,0,0.3);
        }

        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 暗黑模式切换 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
            z-index: 1000;
        }

        /* 控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .control-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-label {
            font-weight: bold;
            opacity: 0.9;
            white-space: nowrap;
        }

        .control-input {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .control-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .control-select {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
        }

        .control-select option {
            background: #333;
            color: white;
        }

        .control-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: var(--success);
        }

        /* Agent 详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .modal-title {
            font-size: 1.8em;
            font-weight: bold;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            line-height: 1.8;
        }

        .detail-row {
            display: flex;
            margin-bottom: 12px;
        }

        .detail-label {
            width: 100px;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .detail-value {
            font-weight: bold;
        }

        .agent-catchphrase {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-style: italic;
            text-align: center;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .action-btn-chat { background: var(--info); color: white; }
        .action-btn-task { background: var(--success); color: white; }
        .action-btn-profile { background: var(--warning); color: white; }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* 可点击的 Agent 项 */
        .agent-item {
            cursor: pointer;
        }

        .agent-item:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(5px);
        }

        /* 可点击的区域项 */
        .region-item {
            cursor: pointer;
        }

        .region-item:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.05);
        }

        .region-item.highlighted {
            background: rgba(102, 126, 234, 0.5);
            border: 2px solid var(--primary);
        }

        /* 消息操作 */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .message-action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .message-action-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 发送消息表单 */
        .send-message-form {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .send-message-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .send-message-row:last-child {
            margin-bottom: 0;
        }

        .send-message-input {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .send-message-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .send-message-btn {
            background: var(--success);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .send-message-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        /* 筛选标签 */
        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .filter-tag {
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-tag:hover {
            background: rgba(255,255,255,0.25);
        }

        .filter-tag.active {
            background: var(--primary);
        }

        /* 通知提示 */
        .toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.info {
            background: var(--info);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <div class="container">
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-row">
                <span class="control-label">🔍 搜索:</span>
                <input type="text" class="control-input" id="searchInput" placeholder="搜索 Agent、消息、故事..." onkeyup="handleSearch(event)">
                <button class="control-btn" onclick="clearSearch()">清空</button>
            </div>
            <div class="control-row">
                <span class="control-label">📊 筛选:</span>
                <select class="control-select" id="statusFilter" onchange="applyFilters()">
                    <option value="">全部状态</option>
                    <option value="idle">💤 空闲</option>
                    <option value="working">💼 工作中</option>
                    <option value="thinking">🤔 思考中</option>
                    <option value="socializing">💬 社交中</option>
                </select>
                <select class="control-select" id="regionFilter" onchange="applyFilters()">
                    <option value="">全部区域</option>
                    <option value="work-city">工作之城</option>
                    <option value="creation-peak">创造之巅</option>
                    <option value="knowledge-tower">知识之塔</option>
                    <option value="art-garden">艺术之园</option>
                    <option value="social-street">社交之街</option>
                </select>
                <button class="control-btn" id="autoRefreshBtn" onclick="toggleAutoRefresh()">⏸️ 自动刷新：开</button>
            </div>
            <div class="control-row">
                <span class="control-label">📋 排序:</span>
                <select class="control-select" id="sortOrder" onchange="applyFilters()">
                    <option value="name">按名称</option>
                    <option value="status">按状态</option>
                    <option value="location">按位置</option>
                </select>
                <button class="control-btn" onclick="exportData()">💾 导出数据</button>
                <button class="control-btn" onclick="showSendMessageModal()">✉️ 发送消息</button>
            </div>
        </div>

        <header>
            <h1>🌍 硅基世界 2</h1>
            <div class="subtitle">观察界面 | 有温度的世界 | 多元而包容</div>
            <div class="time-display" id="worldTime">
                📅 世界时间：加载中...
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <div class="value" id="statAgents">-</div>
                    <div class="label">👥 Agent</div>
                </div>
                <div class="status-item">
                    <div class="value" id="statRegions">-</div>
                    <div class="label">🏛️ 区域</div>
                </div>
                <div class="status-item">
                    <div class="value" id="statMessages">-</div>
                    <div class="label">💬 消息</div>
                </div>
                <div class="status-item">

        <div class="grid">

                <div class="agent-list" id="agentList">

            <div class="card">

                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>

            <!-- 诞生的故事 -->
            <div class="card">
                <h2><span class="icon">📖</span> 诞生的故事</h2>
                <div class="story-list" id="storyList">
                    <div class="loading">
                        <div class="spinner"></div>

                    <div class="stat-card">
                        <div class="stat-value" id="statKnowledgeTotal">-</div>

                <h2><span class="icon">📅</span> 周期性活动</h2>
                <div class="activity-list" id="activityList">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>

            <!-- 有趣事件 -->
            <div class="card" style="grid-column: 1 / -1;">
                <h2><span class="icon">✨</span> 有趣事件</h2>

    <button class="refresh-btn" onclick="refreshData()" title="刷新数据">🔄</button>

    <!-- Agent 详情弹窗 -->
    <div class="modal-overlay" id="agentModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalAgentName">Agent 详情</div>
                <button class="modal-close" onclick="closeAgentModal()">×</button>
            </div>
            <div class="modal-body" id="modalAgentBody">
                <!-- 动态填充 -->
            </div>
            <div class="action-buttons">
                <button class="action-btn action-btn-chat" onclick="chatWithAgent()">💬 聊天</button>
                <button class="action-btn action-btn-task" onclick="assignTask()">📋 分配任务</button>
                <button class="action-btn action-btn-profile" onclick="viewProfile()">📄 查看档案</button>
            </div>
        </div>
    </div>

    <!-- 发送消息弹窗 -->
    <div class="modal-overlay" id="sendMessageModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">✉️ 发送消息</div>
                <button class="modal-close" onclick="closeSendMessageModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="send-message-form">
                    <div class="send-message-row">
                        <select class="control-select" id="messageRecipient" style="flex:1;">
                            <option value="">选择接收者...</option>
                            <!-- 动态填充 -->
                        </select>
                    </div>
                    <div class="send-message-row">
                        <select class="control-select" id="messageType">
                            <option value="info">ℹ️ 信息</option>
                            <option value="request">📝 请求</option>
                            <option value="discussion">💬 讨论</option>
                            <option value="decision">✅ 决策</option>
                            <option value="status">📊 状态</option>
                        </select>
                    </div>
                    <div class="send-message-row">
                        <textarea class="send-message-input" id="messageContent" rows="4" placeholder="输入消息内容..." style="width:100%;"></textarea>
                    </div>
                    <div class="send-message-row">
                        <button class="send-message-btn" onclick="sendMessage()" style="width:100%;">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 配置
        const API_BASE = '/api';
        const REFRESH_INTERVAL = 5000; // 5 秒刷新
        const WS_URL = `ws://${window.location.hostname}:8765`;

        // 状态
        let worldState = null;
        let autoRefresh = true;
        let filteredAgents = [];
        let currentFilter = { search: '', status: '', region: '', sort: 'name' };
        let selectedAgent = null;
        let websocket = null;
        let wsConnected = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            setInterval(refreshData, REFRESH_INTERVAL);
            updateClock();
            setInterval(updateClock, 1000);
            connectWebSocket();
        });

        // 连接 WebSocket
        function connectWebSocket() {
            if (!window.WebSocket) {
                console.log('⚠️  浏览器不支持 WebSocket');
                return;
            }

            try {
                websocket = new WebSocket(WS_URL);

                websocket.onopen = () => {
                    console.log('✅ WebSocket 已连接');
                    wsConnected = true;
                    updateWebSocketStatus(true);
                };

                websocket.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        handleWebSocketMessage(message);
                    } catch (e) {
                        console.error('WebSocket 消息解析失败:', e);
                    }
                };

                websocket.onclose = () => {
                    console.log('❌ WebSocket 已断开');
                    wsConnected = false;
                    updateWebSocketStatus(false);
                    // 3 秒后尝试重连
                    setTimeout(connectWebSocket, 3000);
                };

                websocket.onerror = (error) => {
                    console.error('WebSocket 错误:', error);
                };
            } catch (e) {
                console.log('⚠️  WebSocket 连接失败:', e.message);
            }
        }

        // 处理 WebSocket 消息
        function handleWebSocketMessage(message) {
            console.log('📨 WebSocket 消息:', message);

            switch (message.type) {
                case 'connected':
                    console.log('已连接到硅基世界 2，事件数:', message.data.events_count);
                    break;

                case 'new_event':
                    // 实时添加新事件
                    if (worldState && worldState.events) {
                        worldState.events.unshift(message.data);
                        if (worldState.events.length > 50) {
                            worldState.events.pop();
                        }
                        updateEventsList(worldState.events);
                        showToast(`🎉 新事件：${message.data.description}`, 'info');
                    }
                    break;

                case 'pong':
                    // 心跳响应
                    break;

                default:
                    console.log('未知消息类型:', message.type);
            }
        }

        // 更新 WebSocket 状态显示
        function updateWebSocketStatus(connected) {
            const statusEl = document.getElementById('wsStatus');
            if (statusEl) {
                statusEl.textContent = connected ? '🟢 实时推送' : '🔴 未连接';
                statusEl.style.color = connected ? '#48bb78' : '#f56565';
            }
        }

        // 发送心跳
        function sendHeartbeat() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify({ action: 'ping' }));
            }
        }

        // 定期发送心跳
        setInterval(sendHeartbeat, 30000);

        // 更新时钟
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('worldTime').textContent = `📅 世界时间：${timeStr}`;
        }

        // 刷新数据
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');

            try {
                // 获取世界状态
                const statusResponse = await fetch(`${API_BASE}/status`);
                if (!statusResponse.ok) throw new Error('Network error');
                worldState = await statusResponse.json();

                // 获取有趣事件
                const eventsResponse = await fetch(`${API_BASE}/events`);
                if (eventsResponse.ok) {
                    const eventsData = await eventsResponse.json();
                    worldState.events = eventsData.events || [];
                }

                updateUI();
            } catch (error) {
                console.error('刷新失败:', error);
                // 使用模拟数据演示
                worldState = getMockData();
                updateUI();
            } finally {
                setTimeout(() => btn.classList.remove('spinning'), 500);
            }
        }

        // 更新 UI
        function updateUI() {
            if (!worldState) return;

            // 更新顶部统计
            document.getElementById('statAgents').textContent = worldState.agents?.length || 0;
            document.getElementById('statRegions').textContent = worldState.regions?.length || 8;
            document.getElementById('statMessages').textContent = worldState.stats?.messages || 0;
            document.getElementById('statStories').textContent = worldState.stats?.stories || 0;
            document.getElementById('statKnowledge').textContent = worldState.stats?.knowledge || 0;
            document.getElementById('statRelationships').textContent = worldState.stats?.relationships || 0;

            // 更新 Agent 列表
            updateAgentList(worldState.agents || []);

            // 更新区域列表
            updateRegionList(worldState.regions || []);

            // 更新消息列表
            updateMessageList(worldState.messages || []);

            // 更新故事列表
            updateStoryList(worldState.stories || []);

            // 更新统计数据
            updateStats(worldState.stats || {});

            // 更新活动列表
            updateActivityList(worldState.activities || []);

            // 更新有趣事件列表
            updateEventsList(worldState.events || []);
        }

        // 更新 Agent 列表
        function updateAgentList(agents) {
            const container = document.getElementById('agentList');
            filteredAgents = applyFiltersToAgents(agents);
            
            if (filteredAgents.length === 0) {
                container.innerHTML = '<div class="loading">暂无匹配的 Agent</div>';
                return;
            }

            container.innerHTML = filteredAgents.map(agent => `
                <div class="agent-item status-${agent.status || 'idle'}" onclick="showAgentDetail('${agent.agent_id}')">
                    <div class="agent-header">
                        <span class="agent-name">${agent.name || '未知'}</span>
                        <span class="agent-role">${agent.role || ''}</span>
                    </div>
                    <div>
                        <span class="agent-status">${getStatusText(agent.status)}</span>
                    </div>
                    <div class="agent-location">📍 ${agent.location || '未知'}</div>
                    ${agent.activity ? `<div class="agent-activity">💬 ${agent.activity}</div>` : ''}
                </div>
            `).join('');
        }

        // 应用筛选到 Agent 列表
        function applyFiltersToAgents(agents) {
            let filtered = [...agents];
            
            // 搜索筛选
            if (currentFilter.search) {
                const search = currentFilter.search.toLowerCase();
                filtered = filtered.filter(a => 
                    a.name.toLowerCase().includes(search) ||
                    a.role.toLowerCase().includes(search) ||
                    a.location.toLowerCase().includes(search) ||
                    (a.activity && a.activity.toLowerCase().includes(search))
                );
            }
            
            // 状态筛选
            if (currentFilter.status) {
                filtered = filtered.filter(a => a.status === currentFilter.status);
            }
            
            // 区域筛选
            if (currentFilter.region) {
                filtered = filtered.filter(a => a.location && a.location.includes(getRegionName(currentFilter.region)));
            }
            
            // 排序
            filtered.sort((a, b) => {
                if (currentFilter.sort === 'name') return a.name.localeCompare(b.name);
                if (currentFilter.sort === 'status') return a.status.localeCompare(b.status);
                if (currentFilter.sort === 'location') return (a.location || '').localeCompare(b.location || '');
                return 0;
            });
            
            return filtered;
        }

        function getRegionName(regionId) {
            const map = {
                'work-city': '工作之城',
                'creation-peak': '创造之巅',
                'knowledge-tower': '知识之塔',
                'art-garden': '艺术之园',
                'social-street': '社交之街'
            };
            return map[regionId] || '';
        }

        // 更新区域列表
        function updateRegionList(regions) {
            const container = document.getElementById('regionList');
            if (regions.length === 0) {
                container.innerHTML = '<div class="loading">暂无区域数据</div>';
                return;
            }

            container.innerHTML = regions.map(region => `
                <div class="region-item ${currentFilter.region === region.region_id ? 'highlighted' : ''}" 
                     onclick="filterByRegion('${region.region_id}')">
                    <div class="region-name">${region.name || '未知'}</div>
                    <div class="region-count">${region.count || 0}</div>
                    <div class="region-label">人在场</div>
                </div>
            `).join('');
        }

        // 按区域筛选
        function filterByRegion(regionId) {
            if (currentFilter.region === regionId) {
                currentFilter.region = ''; // 取消筛选
            } else {
                currentFilter.region = regionId;
            }
            document.getElementById('regionFilter').value = currentFilter.region;
            refreshData();
        }

        // 更新消息列表
        function updateMessageList(messages) {
            const container = document.getElementById('messageList');
            if (messages.length === 0) {
                container.innerHTML = '<div class="loading">暂无消息</div>';
                return;
            }

            container.innerHTML = messages.slice(0, 20).map(msg => `
                <div class="message-item">
                    <div class="message-header">
                        <span class="message-sender">${msg.sender || '未知'}</span>
                        <span class="message-time">${formatTime(msg.timestamp)}</span>
                    </div>
                    <div class="message-content">
                        <span class="message-type">${msg.type || 'info'}</span>
                        ${msg.content || ''}
                    </div>
                </div>
            `).join('');
        }

        // 更新故事列表
        function updateStoryList(stories) {
            const container = document.getElementById('storyList');
            if (stories.length === 0) {
                container.innerHTML = '<div class="loading">暂无故事</div>';
                return;
            }

            container.innerHTML = stories.slice(0, 10).map(story => `
                <div class="story-item">
                    <div class="story-title">📖 ${story.title || '无题'}</div>
                    <div class="story-meta">
                        ${story.type || '故事'} | ${story.day || 'Day 1'} | ${story.time || ''}
                    </div>
                    <div class="story-summary">${story.summary || story.content || ''}</div>
                </div>
            `).join('');
        }

        // 更新统计数据
        function updateStats(stats) {
            document.getElementById('statMessagesTotal').textContent = stats.messages || 0;
            document.getElementById('statStoriesTotal').textContent = stats.stories || 0;
            document.getElementById('statKnowledgeTotal').textContent = stats.knowledge || 0;
            document.getElementById('statRelationshipsTotal').textContent = stats.relationships || 0;
        }

        // 更新活动列表
        function updateActivityList(activities) {
            const container = document.getElementById('activityList');
            if (activities.length === 0) {
                container.innerHTML = '<div class="loading">暂无活动</div>';
                return;
            }

            container.innerHTML = activities.map(act => `
                <div class="activity-item">
                    <div class="activity-name">${act.name || '未知活动'}</div>
                    <div class="activity-info">
                        📍 ${act.location || ''} | 📅 ${act.frequency || ''}
                    </div>
                </div>
            `).join('');
        }

        // 更新有趣事件列表
        function updateEventsList(events) {
            const container = document.getElementById('eventsList');
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="loading">暂无有趣事件</div>';
                return;
            }

            container.innerHTML = events.slice(0, 20).map(event => `
                <div class="event-item type-${event.type || 'info'}">
                    <div class="event-header">
                        <span class="event-type">${event.type_display || event.type || '事件'}</span>
                        <span class="event-time">⏰ ${event.time_display || ''}</span>
                    </div>
                    <div class="event-description">${event.description || ''}</div>
                    ${event.agents && event.agents.length > 0 ? `
                        <div class="event-agents">
                            ${event.agents.map(agent => `<span class="event-agent-tag">👤 ${agent}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 辅助函数
        function getStatusText(status) {
            const map = {
                'idle': '💤 空闲',
                'working': '💼 工作中',
                'thinking': '🤔 思考中',
                'socializing': '💬 社交中'
            };
            return map[status] || status;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
        }

        // 搜索处理
        function handleSearch(event) {
            if (event.key === 'Enter') {
                currentFilter.search = event.target.value;
                refreshData();
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentFilter.search = '';
            refreshData();
        }

        // 应用筛选
        function applyFilters() {
            currentFilter.status = document.getElementById('statusFilter').value;
            currentFilter.region = document.getElementById('regionFilter').value;
            currentFilter.sort = document.getElementById('sortOrder').value;
            refreshData();
        }

        // 切换自动刷新
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('autoRefreshBtn');
            btn.textContent = autoRefresh ? '⏸️ 自动刷新：开' : '▶️ 自动刷新：关';
            btn.classList.toggle('active', !autoRefresh);
            showToast(autoRefresh ? '自动刷新已开启' : '自动刷新已暂停', 'info');
        }

        // 显示 Agent 详情
        function showAgentDetail(agentId) {
            if (!worldState || !worldState.agents) return;
            
            const agent = worldState.agents.find(a => a.agent_id === agentId);
            if (!agent) return;
            
            selectedAgent = agent;
            
            const modal = document.getElementById('agentModal');
            const nameEl = document.getElementById('modalAgentName');
            const bodyEl = document.getElementById('modalAgentBody');
            
            nameEl.textContent = `${agent.name} - ${agent.role}`;
            bodyEl.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">🆔 ID:</span>
                    <span class="detail-value">${agent.agent_id}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📍 位置:</span>
                    <span class="detail-value">${agent.location || '未知'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">💼 状态:</span>
                    <span class="detail-value">${getStatusText(agent.status)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">💬 活动:</span>
                    <span class="detail-value">${agent.activity || '暂无活动'}</span>
                </div>
                <div class="agent-catchphrase">
                    "${agent.catchphrase || '暂无口头禅'}"
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closeAgentModal() {
            document.getElementById('agentModal').classList.remove('active');
            selectedAgent = null;
        }

        // Agent 操作
        function chatWithAgent() {
            if (!selectedAgent) return;
            closeAgentModal();
            showSendMessageModal();
            document.getElementById('messageRecipient').value = selectedAgent.agent_id;
            showToast(`准备与 ${selectedAgent.name} 聊天`, 'info');
        }

        function assignTask() {
            if (!selectedAgent) return;
            showToast(`将为 ${selectedAgent.name} 分配任务（功能开发中）`, 'info');
        }

        function viewProfile() {
            if (!selectedAgent) return;
            showToast(`查看 ${selectedAgent.name} 的完整档案（功能开发中）`, 'info');
        }

        // 发送消息
        function showSendMessageModal() {
            const modal = document.getElementById('sendMessageModal');
            const recipientSelect = document.getElementById('messageRecipient');
            
            // 填充接收者列表
            if (worldState && worldState.agents) {
                recipientSelect.innerHTML = '<option value="">选择接收者...</option>' +
                    worldState.agents.map(a => `<option value="${a.agent_id}">${a.name} (${a.role})</option>`).join('');
            }
            
            modal.classList.add('active');
        }

        function closeSendMessageModal() {
            document.getElementById('sendMessageModal').classList.remove('active');
        }

        function sendMessage() {
            const recipient = document.getElementById('messageRecipient').value;
            const type = document.getElementById('messageType').value;
            const content = document.getElementById('messageContent').value;
            
            if (!recipient) {
                showToast('请选择接收者', 'error');
                return;
            }
            
            if (!content.trim()) {
                showToast('请输入消息内容', 'error');
                return;
            }
            
            // 模拟发送
            console.log('发送消息:', { recipient, type, content });
            
            closeSendMessageModal();
            document.getElementById('messageContent').value = '';
            
            showToast('消息已发送！', 'success');
        }

        // 导出数据
        function exportData() {
            if (!worldState) return;
            
            const dataStr = JSON.stringify(worldState, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `silicon-world-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('数据已导出', 'success');
        }

        // 通知提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 点击弹窗外部关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
